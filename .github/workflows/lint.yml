name: Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify runtime entrypoint script syntax
        run: bash -n scripts/runtime/entrypoint.sh

      - name: Verify runtime healthcheck script syntax
        run: bash -n scripts/runtime/healthcheck.sh

      - name: Verify CI healthcheck script syntax
        run: bash -n scripts/ci/healthcheck.sh

      - name: Verify CI smoke script syntax
        run: bash -n scripts/ci/smoke.sh

      - name: Verify CI helper library syntax
        run: bash -n scripts/ci/lib.sh

      - name: Run ShellCheck on shell scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          check_together: 'yes'
          scandir: ./scripts

      - name: Validate base Compose configuration
        run: docker compose -f compose.yaml config

      - name: Validate Docker Compose override configuration
        env:
          DOCKER_GID: "998"
        run: docker compose -f compose.yaml -f compose.docker.yaml config
