name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    concurrency:
      group: "${{ github.workflow }}-${{ github.ref }}"
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose -f compose.yaml -f compose.build.yaml build the-ai-crowd

      - name: Run runtime and delegation smoke tests
        run: bash scripts/ci/smoke.sh

      - name: Run healthcheck smoke tests
        run: bash scripts/ci/healthcheck.sh

      - name: Run persisted-state recovery smoke tests
        run: bash scripts/ci/smoke-upgrade.sh
