name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify shell entrypoint syntax
        run: bash -n scripts/entrypoint.sh

      - name: Verify healthcheck script syntax
        run: bash -n scripts/workbench-healthcheck.sh

      - name: Verify healthcheck CI helper syntax
        run: bash -n scripts/ci-healthcheck.sh

      - name: Validate base Compose configuration
        run: docker compose -f docker-compose.yml config

      - name: Validate Docker-aware Compose configuration
        env:
          DOCKER_GID: "998"
        run: docker compose -f docker-compose.yml -f docker-compose.docker.yml config

      - name: Build image
        run: docker compose -f docker-compose.yml build the-ai-crowd

      - name: Smoke test runtime behavior
        run: bash scripts/ci-smoke.sh

      - name: Smoke test healthcheck behavior
        run: bash scripts/ci-healthcheck.sh
