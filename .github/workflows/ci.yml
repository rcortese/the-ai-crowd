name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify shell entrypoint syntax
        run: bash -n scripts/entrypoint.sh

      - name: Validate base Compose configuration
        run: docker compose -f docker-compose.yml config

      - name: Validate Docker-aware Compose configuration
        env:
          DOCKER_GID: "998"
        run: docker compose -f docker-compose.yml -f docker-compose.docker.yml config

      - name: Build workbench image
        run: docker compose -f docker-compose.yml build workbench
