services:
  workbench:
    build:
      context: .
      args:
        NODE_MAJOR: ${NODE_MAJOR:-20}
        USERNAME: ${WORKBENCH_USER:-operator}
        USER_UID: ${WORKBENCH_UID:-1000}
        USER_GID: ${WORKBENCH_GID:-1000}
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-1.0.43}
        GEMINI_CLI_VERSION: ${GEMINI_CLI_VERSION:-0.1.18}
        CODEX_CLI_VERSION: ${CODEX_CLI_VERSION:-0.26.0}
    image: the-ai-crowd:local
    container_name: the-ai-crowd
    init: true
    restart: unless-stopped
    user: "${WORKBENCH_UID:-1000}:${WORKBENCH_GID:-1000}"
    environment:
      TZ: ${TZ:-UTC}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME:-}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL:-}
      GIT_COMMITTER_NAME: ${GIT_COMMITTER_NAME:-}
      GIT_COMMITTER_EMAIL: ${GIT_COMMITTER_EMAIL:-}
      AI_CROWD_ENABLE_DOCKER: ${AI_CROWD_ENABLE_DOCKER:-false}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    stdin_open: true
    tty: true
    tmpfs:
      - /tmp
      - /run
    volumes:
      - ${STATE_DIR:-./state/home}:/home/${WORKBENCH_USER:-operator}
      - ${PROJECTS_DIR:-./state/projects}:/workspace/projects
      - ${REFERENCES_DIR:-./state/references}:/workspace/references:ro
      - ${SCRATCH_DIR:-./state/scratch}:/workspace/scratch
      - ${SSH_DIR:-./state/ssh}:/home/${WORKBENCH_USER:-operator}/.ssh
      - /etc/localtime:/etc/localtime:ro
