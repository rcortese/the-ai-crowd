services:
  the-ai-crowd:
    image: rcortese/the-ai-crowd:latest
    container_name: the-ai-crowd
    init: true
    restart: unless-stopped
    user: "${WORKBENCH_UID:-1000}:${WORKBENCH_GID:-1000}"
    environment:
      TZ: ${TZ:-UTC}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_CROWD_ENABLE_DOCKER: ${AI_CROWD_ENABLE_DOCKER:-false}
      CODEX_MCP_MODEL: ${CODEX_MCP_MODEL:-gpt-5.3-codex}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stdin_open: true
    tty: true
    tmpfs:
      - /tmp
      - /run
    volumes:
      - ./state/home:/home/${WORKBENCH_USER:-operator}
      - ./state/projects:/workspace/projects
      - ./state/references:/workspace/references:ro
      - ./state/scratch:/workspace/scratch
      - ./config:/workspace/config:ro
      - ./state/ssh:/home/${WORKBENCH_USER:-operator}/.ssh
      - /etc/localtime:/etc/localtime:ro
